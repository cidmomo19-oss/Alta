    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-touch-callout: none;
            overflow: hidden;
        }

        #score-container {
            margin-bottom: 20px;
            text-align: center;
        }

        /* Nama karakter/game di bagian atas */
        #title-text {
            font-size: 1.8rem;
            color: #333333;
            margin: 0 0 5px 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #score {
            font-size: 5rem;
            margin: 0;
            color: #222222;
            font-weight: 800;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        #character-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #character {
            width: 300px;
            height: 300px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.05s ease-in-out;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        @media (max-width: 400px) {
            #character {
                width: 250px;
                height: 250px;
            }
            #score {
                font-size: 4rem;
            }
            #title-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div id="score-container">
        <!-- Menampilkan nama Alya Chan -->
        <h2 id="title-text">Alya Chan</h2>
        <h1 id="score">0</h1>
    </div>
    
    <div id="character-container">
        <img id="character" src="https://kappa.lol/im1FCa" alt="Alya Chan" draggable="false">
    </div>

    <script>
        const character = document.getElementById('character');
        const scoreElement = document.getElementById('score');
        let score = 0;

        const imgClosed = "https://kappa.lol/im1FCa";
        const imgOpen = "https://kappa.lol/TXcqKK";

        // Preload gambar biar lancar
        const preloadedImg = new Image();
        preloadedImg.src = imgOpen;

        // Sound Engine (Zero Latency)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        let popSoundBuffer = null;

        fetch("https://kappa.lol/bZUmJG.m4a")
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(audioBuffer => {
                popSoundBuffer = audioBuffer;
            })
            .catch(error => console.error("Gagal memuat audio:", error));

        function playPopSound() {
            if (!popSoundBuffer) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const source = audioCtx.createBufferSource();
            source.buffer = popSoundBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }

        // State & Timer Control
        let isMouthOpen = false;
        let closeTimeout;
        let openTimeout;

        function tapAction(e) {
            if (e && e.cancelable) e.preventDefault();
            
            score++;
            scoreElement.innerText = score;
            playPopSound();

            clearTimeout(closeTimeout);
            clearTimeout(openTimeout);

            if (isMouthOpen) {
                character.src = imgClosed;
                character.style.transform = "scale(1.03)";
                isMouthOpen = false;

                openTimeout = setTimeout(() => {
                    openMouth();
                }, 40);
            } else {
                openMouth();
            }
        }

        function openMouth() {
            character.src = imgOpen;
            character.style.transform = "scale(0.92)";
            isMouthOpen = true;

            closeTimeout = setTimeout(() => {
                character.src = imgClosed;
                character.style.transform = "scale(1)";
                isMouthOpen = false;
            }, 120); 
        }

        character.addEventListener('pointerdown', tapAction);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                e.preventDefault();
                tapAction(e);
            }
        });
    </script>
</body>
</html>
